<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Runner: Fragmentos de Consciencia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: monospace;
            image-rendering: pixelated;
            -webkit-font-smoothing: none;
        }
        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
        }
        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #ui-overlay > * { pointer-events: auto; }

        /* Transition overlay */
        #transition-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            pointer-events: none;
        }

        /* Command Panel */
        #command-panel {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 20, 0.94);
            border: 2px solid #00e5ff;
            box-shadow: 0 0 14px #00e5ff55, inset 0 0 8px #00e5ff22;
            padding: 14px 20px;
            border-radius: 4px;
            color: #00e5ff;
            font-size: 14px;
            min-width: 540px;
        }
        #command-panel h3 {
            margin-bottom: 8px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #00e5ff99;
        }
        #command-input {
            background: #060c14;
            border: 1px solid #00e5ff66;
            color: #00e5ff;
            font-family: monospace;
            font-size: 14px;
            padding: 8px 12px;
            width: 100%;
            outline: none;
            border-radius: 2px;
        }
        #command-input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 8px #00e5ff44;
        }
        #command-help {
            margin-top: 8px;
            font-size: 10px;
            color: #00e5ff66;
            line-height: 1.5;
        }
        #command-queue {
            margin-top: 6px;
            font-size: 11px;
            color: #00e5ffcc;
            min-height: 18px;
            padding: 4px 0;
        }

        /* HUD */
        #hud {
            display: none;
            position: absolute;
            top: 14px; left: 14px;
            color: #00e5ff;
            font-size: 13px;
            text-shadow: 0 0 6px #00e5ff66;
        }
        #hud .hud-item { margin-bottom: 5px; }

        /* State Indicator */
        #state-indicator {
            position: absolute;
            top: 14px; right: 14px;
            display: none;
            padding: 8px 16px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #state-indicator.red {
            background: rgba(255, 30, 30, 0.15);
            border: 1px solid #ff3030;
            color: #ff5050;
            box-shadow: 0 0 10px #ff303044;
        }
        #state-indicator.blue {
            background: rgba(0, 200, 255, 0.12);
            border: 1px solid #00c8ff;
            color: #00e5ff;
            box-shadow: 0 0 10px #00c8ff44;
        }

        /* Level Complete */
        #level-complete {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 10, 20, 0.96);
            border: 2px solid #00e5ff;
            box-shadow: 0 0 24px #00e5ff44, inset 0 0 12px #00e5ff11;
            padding: 36px 56px;
            text-align: center;
            color: #00e5ff;
            border-radius: 4px;
        }
        #level-complete h2 {
            font-size: 20px;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }
        #level-complete .stars { font-size: 30px; margin: 12px 0; }
        #level-complete p { font-size: 12px; color: #00e5ffaa; margin-bottom: 8px; }
        #level-complete button {
            margin-top: 16px;
            background: transparent;
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 10px 24px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            margin-right: 10px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        #level-complete button:hover {
            background: #00e5ff1a;
            box-shadow: 0 0 8px #00e5ff33;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="transition-overlay"></div>
    <div id="ui-overlay">
        <div id="command-panel">
            <h3>// CONSOLA DE COMANDOS</h3>
            <div id="command-queue">Cola: [vacía]</div>
            <input id="command-input" type="text"
                   placeholder="derecha, derecha, salto, izquierda... | Enter = ejecutar"
                   autocomplete="off" spellcheck="false">
            <div id="command-help">
                Movimiento: arriba | abajo | izquierda | derecha | salto<br>
                Estado: X (fuera del input) = cambiar Lógica/Emoción | Enter = ejecutar secuencia
            </div>
        </div>
        <div id="hud">
            <div class="hud-item" id="hud-fragments">FRAGMENTOS: 0/3</div>
            <div class="hud-item" id="hud-time">TIEMPO: 0s</div>
        </div>
        <div id="state-indicator" class="red">ESTADO: LÓGICA ■</div>
        <div id="level-complete">
            <h2>// SECTOR COMPLETADO</h2>
            <div class="stars" id="stars-display">★ ★ ★</div>
            <p id="complete-info"></p>
            <button id="btn-retry">REINTENTAR</button>
            <button id="btn-menu">MENÚ PRINCIPAL</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
